{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="card p-4 text-center mb-4">
        <h1 class="mb-3">Welcome to TCG SCANNER</h1>
        <p class="text-muted mb-4">Scan your trading cards with ease and keep track of your collection.</p>
        <button type="button" class="btn btn-primary btn-lg" onclick="init()">
            Start scanning
        </button>
    </div>

    <div class="card p-4 text-center mb-4">
        <div id="webcam-container" class="mx-auto"></div>
        <div id="class-container" class="mt-4">
            <h2 id="class-name"></h2>
        </div>
        <div id="label-container" class="mt-3"></div>
    </div>
</div>
{% block scripts %}
{{ super() }}
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script src="/static/js/scanner.js"></script>
{% endblock %}
